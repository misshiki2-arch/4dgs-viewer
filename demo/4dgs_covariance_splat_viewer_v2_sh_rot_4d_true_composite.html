<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DGS Covariance Viewer v2 SH rot4d True Composite</title>

    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: Arial, sans-serif; }
    #wrap { position: relative; width: 100%; height: 100%; }
    #cpuCanvas { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: auto; cursor: grab; background: #111; }
    #cpuCanvas:active { cursor: grabbing; }
    #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.72); padding: 12px; border-radius: 8px; min-width: 460px; max-height: calc(100% - 20px); overflow: auto; }
    #ui input[type="range"] { width: 220px; }
    #ui label { display: inline-block; width: 130px; }
    .row { margin-bottom: 8px; }
    #info { margin-top: 8px; font-size: 13px; line-height: 1.4; color: #ccc; white-space: pre-wrap; }
    #drop { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); color: white; font-size: 24px; z-index: 20; }
    button { cursor: pointer; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js"
    }
  }
  </script>
</head>
<body>
<div id="wrap">
  <canvas id="cpuCanvas"></canvas>
  <div id="ui">
    <div class="row"><label>ファイル</label><input id="file" type="file" accept=".splat4d"></div>
    <div class="row"><label>time</label><input id="time" type="range" min="0" max="33" step="0.01" value="0"><span id="timeVal">0.00</span></div>
    <div class="row"><label>splat scale</label><input id="splatScale" type="range" min="0.25" max="5.0" step="0.01" value="1.0"><span id="splatScaleVal">1.00</span></div>
    <div class="row"><label>render scale</label><input id="renderScale" type="range" min="0.1" max="1.0" step="0.05" value="0.35"><span id="renderScaleVal">0.35</span></div>
    <div class="row"><label>stride</label><input id="stride" type="range" min="1" max="256" step="1" value="8"><span id="strideVal">8</span></div>
    <div class="row"><label>max visible</label><input id="maxVisible" type="range" min="1000" max="200000" step="1000" value="30000"><span id="maxVisibleVal">30000</span></div>
    <div class="row"><label>bg gray</label><input id="bgGray" type="range" min="0" max="255" step="1" value="17"><span id="bgGrayVal">17</span></div>
    <div class="row"><label>use SH</label><input id="useSH" type="checkbox" checked><span>有効</span></div>
    <div class="row"><label>use rot4d</label><input id="useRot4d" type="checkbox" checked><span>有効</span></div>
    <div class="row"><label>force SH 3D</label><input id="forceSh3d" type="checkbox"><span>4D SH無効</span></div>
    <div class="row"><label>time duration</label><input id="timeDuration" type="range" min="1" max="100" step="0.1" value="33"><span id="timeDurationVal">33.0</span></div>
    <div class="row"><button id="play">再生</button><button id="renderBtn">再描画</button><button id="resetCam">視点リセット</button></div>
    <div id="info">scene_v2.splat4d を選択してください。

  </div>
  <div id="drop">ここに .splat4d をドロップ</div>

function getViewRotation3x3(){ camera.updateMatrixWorld(true); const e=camera.matrixWorldInverse.elements; return [[e[0],e[4],e[8]],[e[1],e[5],e[9]],[e[2],e[6],e[10]]]; }
function computeScreenSplat(pos,cov3,opacity,renderW,renderH){ const mv=new THREE.Vector3(pos[0],pos[1],pos[2]).applyMatrix4(camera.matrixWorldInverse); const zc=-mv.z; if(zc<=1e-6) return null; const limy=Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5)); const limx=limy*camera.aspect*1.3; let tx=mv.x, ty=mv.y; const txtz=tx/zc, tytz=ty/zc; tx=clamp(txtz,-limx,limx)*zc; ty=clamp(tytz,-1.3*limy,1.3*limy)*zc; const fy=renderH/(2*Math.tan(THREE.MathUtils.degToRad(camera.fov*0.5))); const fx=fy*(renderW/renderH); const J=[[fx/zc,0,-(fx*tx)/(zc*zc)],[0,fy/zc,-(fy*ty)/(zc*zc)],[0,0,0]]; const W=getViewRotation3x3(); const Tm=mat3Mul(W,J); let cov=mat3Mul(mat3Transpose(Tm), mat3Mul(cov3,Tm)); cov[0][0]+=0.3; cov[1][1]+=0.3; const a=cov[0][0], b=cov[0][1], c=cov[1][1]; const det=a*c-b*b; if(!isFinite(det)||det<=0) return null; const inv=1/det; const conic=[c*inv,-b*inv,a*inv]; const mid=0.5*(a+c); const lambda1=mid+Math.sqrt(Math.max(0.1,mid*mid-det)); const lambda2=mid-Math.sqrt(Math.max(0.1,mid*mid-det)); const radius=Math.ceil(3*Math.sqrt(Math.max(lambda1,lambda2))); if(!(radius>0.4)||radius>4096) return null; const clip=new THREE.Vector4(pos[0],pos[1],pos[2],1).applyMatrix4(camera.matrixWorldInverse).applyMatrix4(camera.projectionMatrix); const pw=1/(clip.w+1e-7); const ndcx=clip.x*pw, ndcy=clip.y*pw; const px=0.5*(ndcx+1)*renderW, py=0.5*(1-ndcy)*renderH; return {px,py,conic,radius,depth:zc,opacity}; }
async function renderCpuComposite(){ if(!raw) return; rendering=true; const myToken=++latestRenderToken; const t0=performance.now(); const renderScale=parseFloat(renderScaleSlider.value); const renderW=Math.max(1,Math.round(canvas.width*renderScale)), renderH=Math.max(1,Math.round(canvas.height*renderScale)); const bg=parseInt(bgGraySlider.value,10)/255, bg255=parseInt(bgGraySlider.value,10); const stride=parseInt(strideSlider.value,10), maxVisible=parseInt(maxVisibleSlider.value,10), timestamp=parseFloat(timeSlider.value), scalingModifier=parseFloat(splatScaleSlider.value), useSH=useSHCheck.checked, useRot4d=useRot4dCheck.checked, forceSh3d=forceSh3dCheck.checked, timeDuration=parseFloat(timeDurationSlider.value); controls.update(); camera.updateMatrixWorld(true); const visible=[]; const camPos=camera.position.clone(); for(let i=0;i<raw.N;i+=stride){ const gs=computeGaussianState(i,timestamp,scalingModifier,useRot4d); if(!gs) continue; const color=evalSHColor(raw,i,camPos,gs.pos,timestamp,timeDuration,useSH,forceSh3d); const splat=computeScreenSplat(gs.pos,gs.cov3,gs.opacity,renderW,renderH); if(!splat) continue; visible.push({px:splat.px,py:splat.py,conic:splat.conic,radius:splat.radius,depth:splat.depth,opacity:splat.opacity,color}); if(visible.length>=maxVisible) break; if((visible.length&1023)===0 && performance.now()-t0>20){ await new Promise(r=>setTimeout(r,0)); if(myToken!==latestRenderToken){ rendering=false; return; } } } visible.sort((a,b)=>a.depth-b.depth); const pixelCount=renderW*renderH; const Tbuf=new Float32Array(pixelCount); Tbuf.fill(1); const Cbuf=new Float32Array(pixelCount*3); let processed=0; for(const s of visible){ const minX=Math.max(0,Math.floor(s.px-s.radius)), maxX=Math.min(renderW-1,Math.ceil(s.px+s.radius)), minY=Math.max(0,Math.floor(s.py-s.radius)), maxY=Math.min(renderH-1,Math.ceil(s.py+s.radius)); const [cx,cy,cz]=s.conic; for(let y=minY;y<=maxY;y++){ const dy=s.py-y; let idx=y*renderW+minX; for(let x=minX;x<=maxX;x++,idx++){ const T=Tbuf[idx]; if(T<1e-4) continue; const dx=s.px-x; const power=-0.5*(cx*dx*dx+cz*dy*dy)-cy*dx*dy; if(power>0) continue; const alpha=Math.min(0.99, s.opacity*Math.exp(power)); if(alpha<1/255) continue; const w=alpha*T; const base=idx*3; Cbuf[base]+=s.color[0]*w; Cbuf[base+1]+=s.color[1]*w; Cbuf[base+2]+=s.color[2]*w; Tbuf[idx]=T*(1-alpha); } } processed++; if((processed&255)===0){ await new Promise(r=>setTimeout(r,0)); if(myToken!==latestRenderToken){ rendering=false; return; } } } const img=ctx.createImageData(renderW,renderH), data=img.data; for(let p=0;p<pixelCount;p++){ const T=Tbuf[p], base=p*3, q=p*4; data[q]=Math.round(clamp(Cbuf[base]+T*bg,0,1)*255); data[q+1]=Math.round(clamp(Cbuf[base+1]+T*bg,0,1)*255); data[q+2]=Math.round(clamp(Cbuf[base+2]+T*bg,0,1)*255); data[q+3]=255; } const tmp=document.createElement('canvas'); tmp.width=renderW; tmp.height=renderH; tmp.getContext('2d').putImageData(img,0,0); ctx.save(); ctx.imageSmoothingEnabled=true; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle=`rgb(${bg255},${bg255},${bg255})`; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(tmp,0,0,canvas.width,canvas.height); ctx.restore(); const elapsed=performance.now()-t0; info.textContent=`format=v2
N=${raw.N.toLocaleString()}  visible=${visible.length.toLocaleString()}  stride=${stride}
active_sh_degree=${raw.activeShDegree}  active_sh_degree_t=${raw.activeShDegreeT}
rot_4d(file)=${raw.rot4d}  useRot4d=${useRot4d}  useSH=${useSH}
renderScale=${renderScale.toFixed(2)}  canvas=${renderW}x${renderH}
time=${timestamp.toFixed(2)}  splatScale=${scalingModifier.toFixed(2)}
CPU T-composite render=${elapsed.toFixed(1)} ms
本家の renderCUDA にある front-to-back の T 合成に寄せた CPU 版です。`; rendering=false; }
async function loadArrayBuffer(buf){ raw=parseSplat4DV2(buf); fitCameraToRaw(); scheduleRender(); }
async function loadDefaultScene(){ try{ const res=await fetch('./scene_v2.splat4d'); if(!res.ok) return; await loadArrayBuffer(await res.arrayBuffer()); }catch(e){ console.warn(e); } }
fileInput.addEventListener('change', async e=>{ const f=e.target.files[0]; if(f) await loadArrayBuffer(await f.arrayBuffer()); });
timeSlider.addEventListener('input', ()=>{ timeVal.textContent=Number(timeSlider.value).toFixed(2); scheduleRender();});
splatScaleSlider.addEventListener('input', ()=>{ splatScaleVal.textContent=Number(splatScaleSlider.value).toFixed(2); scheduleRender();});
renderScaleSlider.addEventListener('input', ()=>{ renderScaleVal.textContent=Number(renderScaleSlider.value).toFixed(2); scheduleRender();});
strideSlider.addEventListener('input', ()=>{ strideVal.textContent=strideSlider.value; scheduleRender();});
maxVisibleSlider.addEventListener('input', ()=>{ maxVisibleVal.textContent=maxVisibleSlider.value; scheduleRender();});
bgGraySlider.addEventListener('input', ()=>{ bgGrayVal.textContent=bgGraySlider.value; scheduleRender();});
useSHCheck.addEventListener('change', scheduleRender); useRot4dCheck.addEventListener('change', scheduleRender); forceSh3dCheck.addEventListener('change', scheduleRender); timeDurationSlider.addEventListener('input', ()=>{ timeDurationVal.textContent=Number(timeDurationSlider.value).toFixed(1); scheduleRender();});
playBtn.addEventListener('click', ()=>{ playing=!playing; playBtn.textContent=playing?'停止':'再生'; }); renderBtn.addEventListener('click', scheduleRender); resetCamBtn.addEventListener('click', ()=>{ if(raw) fitCameraToRaw(); scheduleRender();}); controls.addEventListener('change', scheduleRender);
document.addEventListener('dragover', e=>{ e.preventDefault(); drop.style.display='flex';}); document.addEventListener('dragleave', e=>{ e.preventDefault(); drop.style.display='none';}); document.addEventListener('drop', async e=>{ e.preventDefault(); drop.style.display='none'; const f=e.dataTransfer.files[0]; if(f) await loadArrayBuffer(await f.arrayBuffer());});
window.addEventListener('resize', ()=>{ setCanvasSize(); scheduleRender();});
function animate(now){ const dt=Math.min((now-lastTime)/1000,0.1); lastTime=now; if(playing){ let t=parseFloat(timeSlider.value)+dt*2; if(t>parseFloat(timeSlider.max)) t=parseFloat(timeSlider.min); timeSlider.value=t.toFixed(2); timeVal.textContent=Number(timeSlider.value).toFixed(2); scheduleRender(); } controls.update(); requestAnimationFrame(animate); }
timeVal.textContent=Number(timeSlider.value).toFixed(2); splatScaleVal.textContent=Number(splatScaleSlider.value).toFixed(2); renderScaleVal.textContent=Number(renderScaleSlider.value).toFixed(2); strideVal.textContent=strideSlider.value; maxVisibleVal.textContent=maxVisibleSlider.value; bgGrayVal.textContent=bgGraySlider.value; timeDurationVal.textContent=Number(timeDurationSlider.value).toFixed(1);
requestAnimationFrame(animate); loadDefaultScene();
