<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DGS GPU Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
    }
    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #glCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #111;
      cursor: grab;
    }
    #glCanvas:active {
      cursor: grabbing;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      padding: 12px;
      border-radius: 8px;
      min-width: 500px;
      max-height: calc(100% - 20px);
      overflow: auto;
    }
    #ui input[type="range"] {
      width: 220px;
    }
    #ui label {
      display: inline-block;
      width: 150px;
    }
    .row {
      margin-bottom: 8px;
    }
    #info {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.4;
      color: #ccc;
      white-space: pre-wrap;
    }
    #drop {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 24px;
      z-index: 20;
    }
    button {
      cursor: pointer;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js"
    }
  }
  </script>
</head>
<body>
<div id="wrap">
  <canvas id="glCanvas"></canvas>

  <div id="ui">
    <div class="row"><label>ファイル</label><input id="file" type="file" accept=".splat4d"></div>
    <div class="row"><label>time</label><input id="time" type="range" min="0" max="33" step="0.01" value="0"><span id="timeVal">0.00</span></div>
    <div class="row"><label>splat scale</label><input id="splatScale" type="range" min="0.25" max="5.0" step="0.01" value="1.0"><span id="splatScaleVal">1.00</span></div>
    <div class="row"><label>sigma scale</label><input id="sigmaScale" type="range" min="0.1" max="5.0" step="0.01" value="1.0"><span id="sigmaScaleVal">1.00</span></div>
    <div class="row"><label>prefilter var</label><input id="prefilterVar" type="range" min="0.0" max="2.0" step="0.01" value="0.00"><span id="prefilterVarVal">0.00</span></div>
    <div class="row"><label>render scale</label><input id="renderScale" type="range" min="0.1" max="1.0" step="0.05" value="1.0"><span id="renderScaleVal">1.00</span></div>
    <div class="row"><label>stride</label><input id="stride" type="range" min="1" max="256" step="1" value="8"><span id="strideVal">8</span></div>
    <div class="row"><label>max visible</label><input id="maxVisible" type="range" min="1000" max="200000" step="1000" value="200000"><span id="maxVisibleVal">200000</span></div>
    <div class="row"><label>bg gray</label><input id="bgGray" type="range" min="0" max="255" step="1" value="17"><span id="bgGrayVal">17</span></div>
    <div class="row"><label>use SH</label><input id="useSH" type="checkbox" checked><span>有効</span></div>
    <div class="row"><label>use rot4d</label><input id="useRot4d" type="checkbox" checked><span>有効</span></div>
    <div class="row"><label>native rot4d</label><input id="useNativeRot4d" type="checkbox"><span>任意比較用</span></div>
    <div class="row"><label>native marginal</label><input id="useNativeMarginal" type="checkbox"><span>prefilter用</span></div>
    <div class="row"><label>force SH 3D</label><input id="forceSh3d" type="checkbox"><span>4D SH無効</span></div>
    <div class="row"><label>time duration</label><input id="timeDuration" type="range" min="1" max="100" step="0.1" value="33"><span id="timeDurationVal">33.0</span></div>
    <div class="row"><button id="play">再生</button><button id="renderBtn">再描画</button><button id="resetCam">視点リセット</button></div>
    <div id="info">GPU 版 Step72: frame-level bottleneck auto 制御と atlas-capacity-aware transform planning を協調させ、backend atlas payload を作りやすい batch sizing を同条件の deterministic full-frame GPU path で比較しやすくした viewer です。</div>
  </div>

  <div id="drop">ここに .splat4d をドロップ</div>
</div>

<script type="module" src="./js/viewer_app_gpu.js"></script>
</body>
</html>
